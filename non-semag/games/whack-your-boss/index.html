<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Whack Your Boss</title>
    <style>
      body,html{margin:0;padding:0;overflow:hidden;}
      canvas,#container{position:fixed;top:0;left:0;right:0;bottom:0;width:100%;height:100%;border:0;min-width:100vh;min-height:100vh;}
    </style>
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.RufflePlayer.config = {
            polyfills: true, letterbox: "on", autoplay: "on",
            upgradeToHttps: true, showSwfDownload: false, menu: false,
            contextMenu: "off", scale: "exactfit", forceScale: true,
            openUrlMode: "deny", splashScreen: false, warnOnUnsupportedContent: false
        };
        window.addEventListener("load", function() {
            var ruffle = window.RufflePlayer.newest();
            var player = ruffle.createPlayer();
            document.getElementById("container").appendChild(player);
            player.style.width = "100%";
            player.style.height = "100%";
            player.load({ url: "whack-your-boss-24.swf", allowScriptAccess: false });
        });
    </script>
</head>
<body><div id="container"></div></body>
</html>
