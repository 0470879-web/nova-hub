function preload() {
    const progressbarElem = document.querySelector('#progressbar');
    let manager = new THREE.LoadingManager();
    manager.onStart = function ( url, itemsLoaded, itemsTotal ) {
        //console.log( 'Started loading file: ' + url + '.\nLoaded ' + itemsLoaded + ' of ' + itemsTotal + ' files.' );
    };
    manager.onLoad = function ( ) {
        //console.log( 'Loading complete!');
        //init();
        // hide the loading bar
        //const loadingElem = document.querySelector('#loading');
        //loadingElem.style.display = 'none';
        LaggedAPI.init();
        LOADER_BUTTON.style.visibility = "visible";

        document.getElementById('loadddi').style.visibility="hidden";
            document.getElementById('progressText').style.visibility="hidden";
    };
    manager.onProgress = function ( url, itemsLoaded, itemsTotal ) {
        //console.log( 'Loading file: ' + url + '.\nLoaded ' + itemsLoaded + ' of ' + itemsTotal + ' files.' );
        progressbarElem.style.width = `${itemsLoaded / itemsTotal * 100 | 0}%`;
        PROGRESS_TEXT.innerHTML = `${itemsLoaded / itemsTotal * 100 | 0}%`;
    };
    manager.onError = function ( url ) {
        //console.log( 'There was an error loading ' + url );
    };

    var loader = new THREE.FBXLoader( manager );
    // load base character model
    for (const model of Object.values(BaseModel)) {
        loader.load( model.url, function ( fbx ) {
            model.fbx = fbx;
        });
    }
    // load anims
    for (const model of Object.values(Anims)) {
        loader.load( model.url, function ( fbx ) {
            //model.fbx = fbx;
            model.animation = fbx.animations[ 0 ];
        });
    }
    // load textures
    var loaderTex = new THREE.TextureLoader(manager);
    for (const img of Object.values(Textures)) {
        loaderTex.load( img.url, function(texture) {
            texture.encoding = THREE.sRGBEncoding;
            img.texture = texture;
        });
    }
    // load audio
    Sound.listener = new THREE.AudioListener();
    const audioLoader = new THREE.AudioLoader( manager );
    for (const key of Object.values(Sound)) {
        audioLoader.load( key.url, function(buffer) {
            key.sound = new THREE.Audio( Sound.listener );
            key.sound.setBuffer( buffer );
            key.sound.setVolume( 1 );
            if (key.url == 'Sound/music.mp3'){
                key.sound.setLoop( true );
                key.sound.setVolume( 1.3 );
            }
            else if (key.url == 'Sound/footsteps.mp3'){
                key.sound.setLoop( true );
                key.sound.setVolume( 1 );
            }
            else if (key.url == 'Sound/egg.mp3'){
                key.sound.setVolume( 3 );
            }
            else if (key.url == 'Sound/gainedWin.mp3'){
                key.sound.setVolume( 1 );
            }
            else if (key.url == 'Sound/button.mp3'){
                key.sound.setVolume( 2 );
            }
            else if (key.url == 'Sound/button2.mp3'){
                key.sound.setVolume( 0.5 );
            }
            else if (key.url == 'Sound/click.mp3'){
                key.sound.setVolume( 0.6 );
            }
        });
    }
}

function Egg(spawnPos, rarity) {
    var self = {
        egg: null,
        egg2: null,
        sin: 0,

        rarity: rarity,
        text_description: null,
        text_cost: null,
        cost: 3,
        tempVec3: new THREE.Vector3(),
    }
    self.init = function(){
        // graphic
        let egg = BaseModel.egg.fbx.clone();
        egg.traverse(function ( child ) {
            if ( child instanceof THREE.Mesh ) {
                const oldMat = child.material;
                if (oldMat.name == "egg"){
                    child.material = new THREE.MeshLambertMaterial({ map: eval("Textures.egg"+rarity+".texture") });
                    self.egg = child;
                }
                else if (oldMat.name == "ring"){
                    child.material = new THREE.MeshBasicMaterial( { color: oldMat.color });
                }
                else if (oldMat.name == "cylinder"){
                    child.material = new THREE.MeshBasicMaterial( { map: oldMat.map, transparent: true });
                }
            }
        });
        egg.scale.set(0.9,0.9,0.9);
        egg.position.copy(spawnPos);
        scene.add(egg);
        self.egg2 = egg;

        // collision
        //let box = new THREE.Mesh( new THREE.BoxGeometry(500, 500, 500), new THREE.MeshBasicMaterial({ color: 0x123456, wireframe: true  }) );
        egg.boundingBox = new THREE.BoxHelper(egg, 0x00ff00);
        //scene.add(egg.boundingBox);
        egg.box3 = new THREE.Box3().setFromObject(egg);
        sensorsArray.push(egg);
        eval("egg.egg"+rarity+"=true");//egg.egg1 = true;

        // Getting right starting price
        self.cost = eval("egg"+rarity+"Cost");
        self.calculateStartingPrice();

        // Text
        let petText = "";
        if (rarity == 1)
            petText = "Common Egg"
        else if (rarity == 2)
            petText = "Uncommon Egg"
        else if (rarity == 3)
            petText = "Mythical Egg"
        else if (rarity == 4)
            petText = "Legendary Egg"

        self.text_description = new TextSprite(petText, '#FFFFFF').nameSprite;
        self.text_description.material.depthTest = false;
        self.text_description.scale.set(600,600);
        scene.add(self.text_description);
        self.text_description.position.copy(spawnPos);
        self.text_description.position.y = 400;

        self.text_cost = new TextSprite(self.cost + " wins", '#FF6600').nameSprite;//"Buy for: " +
        self.text_cost.material.depthTest = false;
        self.text_cost.scale.set(450,450);
        scene.add(self.text_cost);
        self.text_cost.position.copy(spawnPos);
        self.text_cost.position.y = 300;
        self.tempVec3.copy(spawnPos);
    }
    self.updatePrice = function() {
        scene.remove(self.text_cost);
        self.text_cost = null;
        self.cost *= 2;

        self.text_cost = new TextSprite(self.cost + " wins", '#FF6600').nameSprite;//"Buy for: " +
        self.text_cost.material.depthTest = false;
        self.text_cost.scale.set(450,450);
        scene.add(self.text_cost);
        self.text_cost.position.copy(self.tempVec3);
        self.text_cost.position.y = 300;
    }
    self.calculateStartingPrice = function() {
        for (let i in petsArray){
            if (petsArray[i] == self.rarity){
                self.cost *= 2;
            }
        }
    }
    self.update = function(delta) {
        self.egg.rotation.y += 1*delta;

        self.sin += 13*delta;
        self.egg.position.y -= Math.sin(self.sin)*(150*delta);
    }

    self.init();
    updateArray.push(self);
    return self;
}

        countdownInterval: null,

        clicks: 0,

        floatingTextArray: [],

        liningUpBots: 0,
    }
    self.init = function(){

        self.group = new THREE.Object3D();
        scene.add(self.group);

        });

        /* --END-- */

        let p2 = new TextSprite("Wins: " + wins, '#FF6600');

        self.winsText.scale.set(300,300);
        self.group.add(self.winsText);
        self.winsText.position.y = 590;
        /* --END-- */
    }
    self.moveHub = function(delta){
        if (playerSpeed > 0.5)
            self.group.rotation.y = playerAngle * (Math.PI/180);

        if (playerMove && playerSpeed > 0.5){
            self.oldPos.copy(self.group.position);
            self.group.translateZ((playerSpeed*170)*delta);
            if (!self.run.isRunning()) {
                self.mixer.stopAllAction();
                self.run.fadeIn(0.3);
                self.run.play();
                Sound.walk.sound.play();
            }
        }
        else if (!self.idle.isRunning()){
            self.mixer.stopAllAction();
            self.idle.fadeIn(0.3);
            self.idle.play();
            Sound.walk.sound.pause();
        }
    }
    self.moveRace = function(delta){
        //self.model.rotation.set(0,0,0);
        if (!self.run.isRunning()) {
            self.mixer.stopAllAction();
            self.run.fadeIn(0.3);
            self.run.play();
            Sound.walk.sound.play();
        }
        // player left right movement
        if (playerMove && playerSpeed > 0.5){
            self.oldPos.copy(self.group.position);
            if (playerAngle > 0 && playerAngle < 181){
                if (self.group.position.x < 1000)
                    self.group.translateX((playerSpeed*90)*delta);
            }
            else{
                if (self.group.position.x > -1000)
                    self.group.translateX((playerSpeed*-90)*delta);
            }
        }

        // world movement
        let scrollSpeed = (upgradedBasedSpeed+click)*100;
        for (let i in scrollArray){
            scrollArray[i].position.z -= scrollSpeed*delta;
            if (scrollArray[i].boundingBox){
                scrollArray[i].boundingBox.setFromObject(scrollArray[i]);
                scrollArray[i].box3.setFromObject(scrollArray[i]);
            }

            // check if passed enough z and if yes then place at the beginning of loop - find me
            if (scrollArray[i].scrollRepeat && scrollArray[i].position.z < -12618){
                scrollArray[i].position.z = 81600;
                scrollArray[i].visible = true;// new
            }
        }
    }
    self.dontWalkOffGround = function() {
        self.posVector.copy(self.group.position);//self.posVector = self.group.position.clone();
        self.posVector.y += 200;
        self.raycaster.set(self.posVector,self.dirVector);
        const intersect = self.raycaster.intersectObjects(groundArray);
        if (!intersect.length>0){
            self.group.position.copy(self.oldPos);
        }
    }
    self.collisionCheck = function() {
        if (gameOver || shopDialogOpen) return;

        // COLLISION CHECK IN FREE ROAM
        for (let i in collidersArray){
            let child = collidersArray[i];
            let collision = self.box3.intersectsBox(child.box3);
            if (collision && gameMode == 0){

                var overlapX = Math.min( self.box3.max.x, child.box3.max.x ) - Math.max( self.box3.min.x, child.box3.min.x );

                if ( overlapX < 0 ) return false;

                var overlapY = Math.min( self.box3.max.y, child.box3.max.y ) - Math.max( self.box3.min.y, child.box3.min.y );

                if ( overlapY < 0 ) return false;

                var overlapZ = Math.min( self.box3.max.z, child.box3.max.z ) - Math.max( self.box3.min.z, child.box3.min.z );

                if ( overlapZ < 0 ) return false;

                var minOverlap = Math.min( overlapX, overlapZ );
                var x = y = z = 0;

                switch ( minOverlap ) {

                    case overlapX:

                        x = Math.sign( self.box3.min.x + self.box3.max.x - child.box3.min.x - child.box3.max.x );
                        self.group.position.x += (x * minOverlap);
                        break;

                    case overlapY:

                        y = Math.sign( self.box3.min.y + self.box3.max.y - child.box3.min.y - child.box3.max.y );
                        break;

                    case overlapZ:

                        z = Math.sign( self.box3.min.z + self.box3.max.z - child.box3.min.z - child.box3.max.z );
                        self.group.position.z += (z * minOverlap);
                        break;
                }
            }
            else if (collision && gameMode == 2 && self.initCollisionCooldown < 0) {
                self.initCollisionCooldown = 2;
                wins ++;
                self.scoredWinFX();
                child.visible = false;
            }
        }
        /* --END-- */

        // COLLISION CHECK WITH HUB WORLD INTERACTIVE POINTS
        if (gameMode == 0) {
            for (let i in sensorsArray){
                let child = sensorsArray[i];
                let collision = self.box3.intersectsBox(child.box3);
                // START RACE
                if (collision && self.initCollisionCooldown < 0 && child.startRace){
                   gameMode = 1;
                   // start race countdown and set up race mode - find me
                   self.setUpRace();
                }
                // EGG COMMON
                else if (collision && self.initCollisionCooldown < 0 && child.egg1 && wins >= eggArray[0].cost){
                    // Open shop - find me
                    //console.log('egg1');
                    openEgg(1);
                }
                // EGG MEDIUM
                else if (collision && self.initCollisionCooldown < 0 && child.egg2 && wins >= eggArray[1].cost){
                    // Open shop - find me
                    //console.log('egg2');
                    openEgg(2);
                }
                // EGG RARE
                else if (collision && self.initCollisionCooldown < 0 && child.egg3 && wins >= eggArray[2].cost){
                    // Open shop - find me
                    //console.log('egg3');
                    openEgg(3);
                }
                // EGG EPIC
                else if (collision && self.initCollisionCooldown < 0 && child.egg4 && wins >= eggArray[3].cost){
                    // Open shop - find me
                    //console.log('egg4');
                    openEgg(4);
                }
            }
        }
        /* --END-- */
    }
    self.setUpRace = function() {

        console.log("set up race 1");

        if(self.israceset){
            return;
        }

        self.israceset=true;
        self.group.rotation.y = 0;
        self.mixer.stopAllAction();
        self.idle.fadeIn(0.3);
        self.idle.play();
        Sound.walk.sound.pause();
        if (Sound.click.sound.isPlaying)
            Sound.click.sound.stop();
        Sound.click.sound.play();

        //hubObjects.shopSensor.visible = false;
        hubObjects.startRaceSensor.visible = false;
        hubObjects.startRaceText.visible = false;

        hubObjects.raceBillboard.material.map = Textures.billboard2.texture;
        hubObjects.raceBillboard.material.needsUpdate = true;
        JOYSTICK.style.visibility = "hidden";
        SPEED_IMAGE.style.backgroundImage = "url(Images/speed.png)";
        updateSpeedUIText();

        // create mouse click sprite
        self.clickTextSprite = new THREE.Sprite( new THREE.SpriteMaterial({map:Textures.clickSign.texture}) );
        self.group.add(self.clickTextSprite);
        let ns = 600;
        self.clickTextSprite.scale.set(1*ns,1.1*ns);
        self.clickTextSprite.position.y = 650;
        self.clickTextSprite.position.x = -500;

        // create countdown sprite
        let textSprite = new TextSprite(self.raceCountdown, '#FF5E6E');
        self.counterSprite = textSprite.nameSprite;
        self.counterSprite.scale.set(2000,2000);
        scene.add(self.counterSprite);
        self.counterSprite.position.copy(self.countdownSpritePosVec);
        self.countdownInterval = setInterval(function(){
            if (Sound.click.sound.isPlaying)
                Sound.click.sound.stop();
            Sound.click.sound.play();
            self.raceCountdown --;
            //console.log(self.raceCountdown);
            //update countdown sprite
            scene.remove(self.counterSprite);
            self.counterSprite = null;

            let tSprite = new TextSprite(self.raceCountdown, '#FF5E6E');
            self.counterSprite = tSprite.nameSprite;
            self.counterSprite.scale.set(2000,2000);
            scene.add(self.counterSprite);
            self.counterSprite.position.copy(self.countdownSpritePosVec);
            //on 0 finish start race countdown and start actual race
            if (self.raceCountdown <= 0){

                clearInterval(self.countdownInterval);
                scene.remove(self.counterSprite);
                self.counterSprite = null;
                hubObjects.raceBillboard.visible = false;
                self.clickTextSprite.visible = false;
                gameMode = 2;
                for (let i in eggArray){
                    eggArray[i].egg2.visible = false;
                    eggArray[i].text_description.visible = false;
                    eggArray[i].text_cost.visible = false;
                }
                //console.log("start running");
                JOYSTICK.style.visibility = "visible";
                TIMER_TEXT.style.visibility = "visible";
                minutes = 0;
                seconds = 20;
                setTimerText();
                setTimeout(function(){
                    if(!awardIsAvailable){
                        LaggedAPI.GEvents.reward(canShowReward,rewardSuccess);
                    }  
                }, 2000);
                self.raceTimerInterval = setInterval(function(){

                    seconds --;
                    if (seconds <= 0){
                        if (minutes > 0){
                            seconds = 60;
                            minutes --;
                        }
                        else {
                            minutes = 0;
                            seconds = 0;
                            clearInterval(self.raceTimerInterval);
                            gameOver = true;
                            gameMode = 3;
                            self.mixer.stopAllAction();
                            self.fall.fadeIn(0.3);
                            self.fall.play();
                            self.shadow.visible = false;
                            Sound.over.sound.play();
                            Sound.walk.sound.pause();

                            // end of race
                        }
                    }
                    setTimerText();
                },1000);
            }
        },1000);
    }
    self.scoredWinFX = function() {
        Sound.gainedWin.sound.play();
        self.group.remove(self.winsText);
        self.winsText = null;
        whiteFX();

        let p2 = new TextSprite("Wins: " + wins, '#FF6600');
        self.winsText = p2.nameSprite;
        self.winsText.scale.set(300,300);
        self.group.add(self.winsText);
        self.winsText.position.y = 590;

        // +1 floatin text fx
        let s = new THREE.Sprite(new THREE.SpriteMaterial({ map:Textures.add.texture }));
        self.group.add(s);
        s.scale.set(150,110);
        s.position.y = 500;
        s.position.x = 0;
        s.spawnTimer = -3;
        self.floatingTextArray.push(s);
    }
    self.update = function(delta) {
        self.mixer.update(delta);
        self.boundingBox.setFromObject(self.box);
        self.box3.setFromObject(self.box);
        self.initCollisionCooldown -= 5*delta;

        // Movement
        if (gameMode == 0)
            self.moveHub(delta);
        else if (gameMode == 2){
            self.moveRace(delta);
            if (self.group.position.z < 4000){
                self.group.position.z = THREE.Math.lerp( self.group.position.z, 4000, 4*delta  );//5024 at 5*delta
            }
        }
        if (gameMode == 0)
            self.dontWalkOffGround();
        self.collisionCheck();
        /* --END-- */

        // +1 win floating text fx
        for (let i in self.floatingTextArray){
            self.floatingTextArray[i].position.y += 250*delta;
            self.floatingTextArray[i].spawnTimer += 6*delta;
            if (self.floatingTextArray[i].spawnTimer > 3){
                self.group.remove(self.floatingTextArray[i]);
                self.floatingTextArray.splice(i,1);
            }
        }

        // SHADOW
        var circleGeometry = new THREE.CircleGeometry(320, 6, 15);
        var shadowMaterial = new THREE.MeshBasicMaterial({

    self.moveAroundHubArea = function(delta){
        self.newDestinationCooldown -= rand(5,15)*delta;

        // find new destination
        if (self.newDestinationCooldown < 0 && !self.dancing){
            self.newDestinationCooldown = rand(80,190);

                self.dancing = true;
                self.mixer.stopAllAction();
                self.taunt1.fadeIn(0.3);

            }
            else if (r == 6){
                self.dancing = true;
                self.mixer.stopAllAction();
                self.taunt2.fadeIn(0.3);
                self.taunt2.play();
            }
        }
        self.group.lookAt(self.vectorDestination);

        // move towards new destination
        if (self.group.position.distanceTo(self.vectorDestination) > 100 && !self.dancing){
            self.group.translateZ(self.walkSpeed*delta);
            if (!self.run.isRunning()) {
                self.mixer.stopAllAction();
                self.run.fadeIn(0.3);
                self.run.play();
            }
        }
        else if (!self.dancing){
            if (!self.idle.isRunning()){
                self.mixer.stopAllAction();
                self.idle.fadeIn(0.3);
                self.idle.play();
            }
        }
    }
    self.moveRace = function(delta){
        //self.group.rotation.y = 0
        self.group.lookAt(self.tempVector2);
        let ta = [0,1000,2000,3500,30000,50000,70000]
        if (self.targetz == 0){
            self.targetz = ta[rand(1,ta.length)-1];//4000 is player's
        }
        // set self.z tween
        // if (self.group.position.z < self.targetz){
        self.group.position.z = THREE.Math.lerp( self.group.position.z, self.targetz, 0.1*delta  );
        // }
        if (!self.run.isRunning()) {
            self.mixer.stopAllAction();
            self.run.fadeIn(0.3);
            self.run.play();
        }
    }
    self.collisionCheck = function() {
        // COLLISION CHECK IN FREE ROAM
        for (let i in collidersArray){
            let child = collidersArray[i];
            let collision = self.box3.intersectsBox(child.box3);
            if (collision && gameMode == 0){

                var overlapX = Math.min( self.box3.max.x, child.box3.max.x ) - Math.max( self.box3.min.x, child.box3.min.x );

                if ( overlapX < 0 ) return false;

                var overlapY = Math.min( self.box3.max.y, child.box3.max.y ) - Math.max( self.box3.min.y, child.box3.min.y );

                if ( overlapY < 0 ) return false;

                var overlapZ = Math.min( self.box3.max.z, child.box3.max.z ) - Math.max( self.box3.min.z, child.box3.min.z );

                if ( overlapZ < 0 ) return false;

                var minOverlap = Math.min( overlapX, overlapZ );
                var x = y = z = 0;

                switch ( minOverlap ) {

                    case overlapX:

                        x = Math.sign( self.box3.min.x + self.box3.max.x - child.box3.min.x - child.box3.max.x );
                        self.group.position.x += (x * minOverlap);
                        break;

                    case overlapY:

                        y = Math.sign( self.box3.min.y + self.box3.max.y - child.box3.min.y - child.box3.max.y );
                        break;

                    case overlapZ:

                        z = Math.sign( self.box3.min.z + self.box3.max.z - child.box3.min.z - child.box3.max.z );
                        self.group.position.z += (z * minOverlap);
                        break;
                }
            }
        }
        /* --END-- */
    }
    self.lineUpForRace = function(delta) {
        if (!self.linedUp) {
            if (player.liningUpBots == 0)
                self.tempVector.set(763, 0, 3156);
            else if (player.liningUpBots == 1)
                self.tempVector.set(475, 0, 3156);
            else if (player.liningUpBots == 2)
                self.tempVector.set(-443, 0, 3156);
            else if (player.liningUpBots == 3)
                self.tempVector.set(-754, 0, 3156);

            //self.tempVector.set(rand(-1000,1000), 0, 3156);
            player.liningUpBots ++;
            self.linedUp = true;
        }

        //self.group.rotation.y = 0;
        //self.group.lookAt(self.vectorDestination);
        if (self.group.position.distanceTo(self.tempVector) > 50){
            self.group.position.z = THREE.Math.lerp( self.group.position.z, self.tempVector.z, 2*delta  );
            self.group.position.x = THREE.Math.lerp( self.group.position.x, self.tempVector.x, 2*delta  );
            self.group.lookAt(self.tempVector);
        }
        // else {
        //     self.group.rotation.y = 0;
        // }
        if (!self.idle.isRunning()){
            self.mixer.stopAllAction();
            self.idle.fadeIn(0.3);
            self.idle.play();
            //Sound.walk.sound.pause();
        }
    }
    self.update = function(delta) {
        self.mixer.update(delta);
        self.boundingBox.setFromObject(self.box);
        self.box3.setFromObject(self.box);


        // Movement
        if (gameMode == 0) {
            self.moveAroundHubArea(delta);
            //self.collisionCheck();
        }
        else if (gameMode == 1) {
            self.lineUpForRace(delta);
        }
        else if (gameMode == 2) {
            self.moveRace(delta);
        }
        /* --END-- */
    }

    self.init();
    updateArray.push(self);
    return self;
}

        }

    particleArray.push(self);
    return self;

function gradTexture(color) {
    var c = document.createElement("canvas");
    var ct = c.getContext("2d");
    var size = 1024;
    c.width = 16; c.height = size;
    var gradient = ct.createLinearGradient(0,0,0,size);
    var i = color[0].length;
    while(i--){ gradient.addColorStop(color[0][i],color[1][i]); }
    ct.fillStyle = gradient;
    ct.fillRect(0,0,16,size);
    var texture = new THREE.Texture(c);
    texture.needsUpdate = true;
    texture.encoding = THREE.sRGBEncoding;
    return texture;
}

function TextSprite (text, textColor) {
    var self = {

    }
    self.init = function(){
        const ctx = document.createElement('canvas').getContext('2d');
        const borderSize = 2;
        const font =  `1000 30px Arial`;
        ctx.font = font;
        // measure how long the name will be
        const textWidth = ctx.measureText(text).width;
        const doubleBorderSize = borderSize * 2;
        const width = 200 + doubleBorderSize;
        const height = 200 + doubleBorderSize;
        ctx.canvas.width = width;
        ctx.canvas.height = height;
        ctx.font = font;

        // need to set font again after resizing canvas
        ctx.textBaseline = 'middle';
        ctx.textAlign = 'center';
        // scale to fit but don't stretch
        const scaleFactor = Math.min(1, 200 / textWidth);
        ctx.translate(width / 2, height / 2);
        ctx.scale(scaleFactor, 1);
        if (textColor)
            ctx.fillStyle = textColor;
        else
            ctx.fillStyle = '#FFFFFF';
        ctx.strokeStyle = '#000000';
        ctx.lineWidth = 5;
        ctx.strokeText(text, 0, 0);
        ctx.fillText(text, 0, 0);

        const texture = new THREE.CanvasTexture(ctx.canvas);
        texture.encoding = THREE.sRGBEncoding;
        texture.minFilter = THREE.LinearFilter;
        texture.wrapS = THREE.ClampToEdgeWrapping;
        texture.wrapT = THREE.ClampToEdgeWrapping;

        spriteMaterial = new THREE.SpriteMaterial({map:texture});
        self.nameSprite = new THREE.Sprite(spriteMaterial);
        const labelBaseScale = 0.01;
        self.nameSprite.scale.x =  width*1.4;
        self.nameSprite.scale.y =  height*1.3;
    }

    self.init();
    return self;
}

        WHITE_FX.removeEventListener('animationend', removeMenu);
        WHITE_FX.classList.remove('animate__animated', 'animate__fadeOut');
        WHITE_FX.style.visibility = "hidden";
        WHITE_FX.style.opacity = "0.9";
    }
}

function updateSpeedUIText () {
    SPEED_TEXTSTART.innerHTML = upgradedBasedSpeed;//"Base Speed: "+
    SPEED_TEXTEND.innerHTML = upgradedBasedSpeed+click;
}

function calculatePlayerBaseSpeed() {
    upgradedBasedSpeed = 0;

    for (let i in petsArray) {
        //key
        //pets[key]
        upgradedBasedSpeed += petsArray[i]*20//pets[key];
    }
}

function setTimerText() {
    if (seconds < 10){
        TIMER_TEXT.innerHTML = "0"+minutes+":0"+seconds;
    }
    else {
        TIMER_TEXT.innerHTML = "0"+minutes+":"+seconds;
    }
}

// LAGGED API REWARDED ADS
//this will be called if a reward ad can be shown or not
var checkedIt=0;
function canShowReward (success,showAdFn){
    checkedIt++;
    if(success) {
        checkedIt=0;
        //you can show user a button for a reward, must call showAdFn() on click
        //ex: rewardButton.onclick=function(){showAdFn();}
        showReviveUI();
        awardIsAvailable=true;
        document.querySelector('#btnReward').onclick=function(){
            Sound.listener.setMasterVolume(0);
            // pause game here if needed
            showAdFn();
            BTN_REWARD.style.visibility = "hidden";
        }
    }
    else {
        awardIsAvailable=false;
        //no ad to show, do nothing
        console.log('No rewarded ad available');
        BTN_REWARD.style.visibility = "hidden";

        if(checkedIt<3){
            setTimeout(function(){
                    if(!awardIsAvailable){
                        LaggedAPI.GEvents.reward(canShowReward,rewardSuccess);
                    }  
         }, 1000);
        }else{
            checkedIt=0;
        }

    }
}

//after ad is played (after showAdFn() is called)
function rewardSuccess(success){
    if(success) {
        //give user the reward
        console.log('Reward granted successfully');
        //Sound.good.sound.play();
        wins += 100;
        if (gameMode == 2){
            player.scoredWinFX();
        }
    }
    else {
        //no reward
        console.log('No reward');

    }
    if (BTN_SOUND.style.opacity == 1){
        Sound.listener.setMasterVolume(1);
    }
    //remove reward button
    BTN_REWARD.style.visibility = "hidden";
    awardIsAvailable=false;
}

function showReviveUI() {
    BTN_REWARD.style.visibility = "visible";
}

</script>
