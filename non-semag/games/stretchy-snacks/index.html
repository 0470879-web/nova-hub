<script>
			const progressBarWidthElement = document.getElementById('progress-width');
			let progress = 0;
			function _updateProgressBar() {
				const currentWidth = progressBarWidthElement.style.width.replace('%', '');
				const displayedProgress = (parseInt(currentWidth) || 0) / 100;
				const newProgress = Math.max(displayedProgress, progress);
				progressBarWidthElement.style.width = Math.floor(newProgress * 100) + '%';
			}
			const intervalId = setInterval(() => {
				progress += 0.01;
				_updateProgressBar();
				if (progress >= 1) {
					clearInterval(intervalId);
				}
			}, 100);
		</script>
